# CI test gate — ruff + pytest on every push to main and every PR.
#
# Hermetic tests only (Gemini / Slack / Firestore are mocked). Live eval runs in
# eval.yml (weekly + path-filtered PRs).
name: CI (ruff + pytest)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff (live packages)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff lint check
        run: uv run ruff check app ledgr_agent ledgr_slack tests

  test:
    name: Pytest (hermetic)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -n auto
