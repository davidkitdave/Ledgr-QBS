# CI/CD deploy pipeline: push to main → test → build → deploy (live traffic)
#
# Stages:
#   1. test       — ruff check + pytest (deploy requires this green)
#   2. build-push — docker build → SHA-tagged image → Artifact Registry
#   3. deploy     — gcloud run deploy with the full flag set from
#                   scripts/deploy-prod.sh (single source of truth). New revision
#                   takes 100% traffic immediately. The test gate is the safety net.
#   4. rollback   — workflow_dispatch job: shift traffic back to a prior named
#                   revision (one-click revert if a bad deploy ever ships).
#
# Prerequisites (run scripts/gcloud-bootstrap-cicd.sh once first):
#
#   REPOSITORY variables (Settings → Secrets and variables → Actions → Variables tab):
#     WORKLOAD_IDENTITY_PROVIDER  — WIF provider resource name (output by bootstrap script)
#     CICD_SERVICE_ACCOUNT        — ledgr-cicd@ledgr-qbs.iam.gserviceaccount.com
#     SLACK_BASE_URL              — https://ledgr-640071771526.asia-southeast1.run.app
#     SLACK_CLIENT_ID             — public Slack client ID (not a secret)
#     LEDGR_MODEL_LITE            — gemini-2.5-flash
#     LEDGR_MODEL_STD             — gemini-2.5-flash
#
#   No GitHub secrets needed: SLACK_CLIENT_SECRET / SLACK_SIGNING_SECRET are
#   pulled from GCP Secret Manager by Cloud Run at deploy time via --set-secrets.

name: Deploy to Cloud Run

# AUTO-DEPLOY DISABLED during the ledgr_agent cutover (2026-06-25).
# Push-to-main no longer auto-builds/auto-ships to prod. Deploys are
# manual-only: Actions → Deploy to Cloud Run → Run workflow. The full
# test signal on push/PR now lives in ci.yml.
# To re-enable auto-deploy, uncomment the `push:` trigger below.
on:
  # push:
  #   branches: [main]
  workflow_dispatch:
    inputs:
      rollback_revision:
        description: >
          Named Cloud Run revision to roll back to
          (e.g. ledgr-00042-abc). Leave blank for normal deploy.
        required: false
        default: ""

# Only one deploy pipeline at a time on main.
concurrency:
  group: deploy-main
  cancel-in-progress: false   # do not cancel an in-flight deploy; queue instead

env:
  PROJECT: ledgr-qbs
  REGION: asia-southeast1
  SERVICE: ledgr
  AR_HOST: asia-southeast1-docker.pkg.dev
  IMAGE_BASE: asia-southeast1-docker.pkg.dev/ledgr-qbs/ledgr/app

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1 — Test gate. Must pass before any build or deploy.
  # ---------------------------------------------------------------------------
  test:
    name: Test gate (ruff + pytest)
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.rollback_revision == ''
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff lint check
        run: uv run ruff check .

      - name: Run tests
        # All tests are hermetic (Gemini / Slack / Firestore are mocked).
        run: uv run pytest

  # ---------------------------------------------------------------------------
  # Stage 2 — Build + push immutable SHA-tagged image (never tags "latest").
  # ---------------------------------------------------------------------------
  build-push:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.rollback_revision == ''
    permissions:
      id-token: write   # required for WIF OIDC token exchange
      contents: read
    outputs:
      image: ${{ steps.image-tag.outputs.image }}
      short_sha: ${{ steps.image-tag.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: image-tag
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          IMAGE="${IMAGE_BASE}:${GITHUB_SHA}"
          echo "image=${IMAGE}"          >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}"  >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud (WIF — keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.CICD_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "$AR_HOST" --quiet

      - name: Build Docker image
        run: |
          docker build \
            --tag "${{ steps.image-tag.outputs.image }}" \
            --label "git.sha=${GITHUB_SHA}" \
            --label "git.ref=${GITHUB_REF}" \
            .

      - name: Push to Artifact Registry
        run: docker push "${{ steps.image-tag.outputs.image }}"

  # ---------------------------------------------------------------------------
  # Stage 3 — Deploy to Cloud Run (100% traffic on the new revision).
  #
  # Flags are sourced verbatim from scripts/deploy-prod.sh (single source of
  # truth). The parity step greps deploy-prod.sh to confirm no flag has drifted.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [build-push]
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.rollback_revision == ''
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF — keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.CICD_SERVICE_ACCOUNT }}

      - name: Assert deploy flag parity with scripts/deploy-prod.sh
        run: |
          PARITY_OK=true
          check_flag() {
            local flag="$1"
            if ! grep -qF -- "$flag" scripts/deploy-prod.sh; then
              echo "::error::Parity failure: '$flag' is in deploy.yml but not in scripts/deploy-prod.sh"
              PARITY_OK=false
            fi
          }
          check_flag "--allow-unauthenticated"
          check_flag "--min-instances"
          check_flag "--max-instances"
          check_flag "SLACK_CLIENT_SECRET=SLACK_CLIENT_SECRET:latest"
          check_flag "SLACK_SIGNING_SECRET=SLACK_SIGNING_SECRET:latest"
          check_flag "LEDGR_ENV=prod"
          check_flag "SLACK_CLIENT_ID="
          check_flag "SLACK_BASE_URL="
          check_flag "GOOGLE_GENAI_USE_VERTEXAI=TRUE"
          check_flag "GOOGLE_CLOUD_PROJECT="
          check_flag "GOOGLE_CLOUD_LOCATION="
          check_flag "FIRESTORE_PROJECT="
          check_flag "LEDGR_MODEL_LITE="
          check_flag "LEDGR_MODEL_STD="
          check_flag "ledgr-runtime@"
          if [[ "$PARITY_OK" != "true" ]]; then
            echo "::error::deploy.yml is missing flags that exist in scripts/deploy-prod.sh."
            exit 1
          fi
          echo "Flag parity OK."

      # Record the current live revision so a rollback target is logged before
      # the new revision takes over.
      - name: Capture prior revision (rollback target)
        run: |
          PRIOR="$(gcloud run services describe "$SERVICE" \
            --region "$REGION" --project "$PROJECT" \
            --format='value(status.latestReadyRevisionName)' 2>/dev/null || true)"
          echo "Prior live revision (rollback target if needed): ${PRIOR}"
          echo "To roll back: Actions → Deploy to Cloud Run → Run workflow → rollback_revision=${PRIOR}"

      - name: Deploy revision (100% traffic)
        env:
          IMAGE: ${{ needs.build-push.outputs.image }}
          SLACK_BASE_URL: ${{ vars.SLACK_BASE_URL }}
          SLACK_CLIENT_ID: ${{ vars.SLACK_CLIENT_ID }}
          LEDGR_MODEL_LITE: ${{ vars.LEDGR_MODEL_LITE }}
          LEDGR_MODEL_STD: ${{ vars.LEDGR_MODEL_STD }}
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE" \
            --region "$REGION" \
            --project "$PROJECT" \
            --service-account "ledgr-runtime@${PROJECT}.iam.gserviceaccount.com" \
            --allow-unauthenticated \
            --min-instances 1 \
            --max-instances 1 \
            --set-secrets "SLACK_CLIENT_SECRET=SLACK_CLIENT_SECRET:latest,SLACK_SIGNING_SECRET=SLACK_SIGNING_SECRET:latest" \
            --set-env-vars "LEDGR_ENV=prod,SLACK_CLIENT_ID=${SLACK_CLIENT_ID},SLACK_BASE_URL=${SLACK_BASE_URL},GOOGLE_GENAI_USE_VERTEXAI=TRUE,GOOGLE_CLOUD_PROJECT=${PROJECT},GOOGLE_CLOUD_LOCATION=${REGION},FIRESTORE_PROJECT=${PROJECT},LEDGR_MODEL_LITE=${LEDGR_MODEL_LITE},LEDGR_MODEL_STD=${LEDGR_MODEL_STD}" \
            --quiet
          echo "Deployed ${IMAGE} to ${SERVICE} (100% traffic)."

  # ---------------------------------------------------------------------------
  # Rollback (workflow_dispatch only). Set rollback_revision to a named revision
  # (printed in the deploy log above). Shifts 100% traffic back — no rebuild.
  # ---------------------------------------------------------------------------
  rollback:
    name: Rollback to prior revision
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.rollback_revision != ''
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Authenticate to Google Cloud (WIF — keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.CICD_SERVICE_ACCOUNT }}

      - name: Shift 100% traffic to prior revision
        env:
          ROLLBACK_REVISION: ${{ github.event.inputs.rollback_revision }}
        run: |
          echo "Rolling back to revision: ${ROLLBACK_REVISION}"
          gcloud run services update-traffic "$SERVICE" \
            --region "$REGION" \
            --project "$PROJECT" \
            --to-revisions "${ROLLBACK_REVISION}=100" \
            --quiet
          echo "Traffic shifted to ${ROLLBACK_REVISION} (100%)."
