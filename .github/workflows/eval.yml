name: Ledgr agent live eval

on:
  pull_request:
    paths:
      - "ledgr_agent/**"
      - "scripts/ledgr_eval_light.sh"
      - ".github/workflows/eval.yml"
  schedule:
    # Mondays 09:00 SGT (01:00 UTC)
    - cron: "0 1 * * 1"
  workflow_dispatch:

jobs:
  ledgr-light-eval:
    name: ledgr_agent reference-free invoice eval (live)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run live eval (skip without creds)
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
        run: |
          if [[ -z "${GOOGLE_API_KEY:-}" && -z "${GOOGLE_CLOUD_PROJECT:-}" ]]; then
            echo "No Gemini creds in CI secrets — skipping live eval."
            exit 0
          fi
          bash scripts/ledgr_eval_light.sh

  pii-guard:
    name: PII guard (no real client / vendor names)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PII guard
        run: bash scripts/check_no_pii.sh
