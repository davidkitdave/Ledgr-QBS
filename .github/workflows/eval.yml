# ADR-0015 eval gate — fails the build if the F-cluster gate falls
# below 0.9. Triggered on PRs that touch the extraction / export code
# and on a weekly schedule (so prompt drift is caught even when no PR
# lands).
#
# Reference: docs/adr/0015-eval-driven-prompt-loop.md
#
# The pytest path used here is hermetic (no live LLM) so the gate
# runs without GOOGLE_API_KEY / GOOGLE_CLOUD_PROJECT secrets. The
# rubric LLM-as-judge gate runs separately in the nightly workflow
# (out of scope for the PR gate; it requires credentials and is
# slower).
name: ADR-0015 Eval Gate

on:
  pull_request:
    paths:
      - "invoice_processing/extract/**"
      - "invoice_processing/export/**"
      - "tests/eval/**"
      - "scripts/eval_loop.py"
      - "scripts/check_no_pii.sh"
      - "docs/adr/0015-eval-driven-prompt-loop.md"
      - ".github/workflows/eval.yml"
  push:
    branches: [main]
  schedule:
    # Mondays 09:00 SGT (01:00 UTC) — prompt-drift check.
    - cron: "0 1 * * 1"
  workflow_dispatch:

jobs:
  f-cluster-gate:
    name: F-cluster gate (>= 0.9 per ADR-0015)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run ADR-0015 F-cluster gate
        # The gate is hermetic (offline scoring) so no creds are
        # required. A failure here means a metric on at least one
        # F-case has dropped below 0.9, blocking merge.
        run: uv run pytest tests/eval/test_f_extract_direction.py -m eval -v --color=yes

  pii-guard:
    name: PII guard (no real client / vendor names)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PII guard
        # Scans invoice_processing/, accounting_agents/, tests/, eval/,
        # docs/adr/ for known real names. Allowlist in the script
        # covers the existing B-cluster chat probe (Company-A / Person-1)
        # plus the historical ADR-0014 reference.
        run: bash scripts/check_no_pii.sh
