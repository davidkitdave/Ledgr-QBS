metrics_to_run:
  - accounting_task_success_code
  - doc_type_code
  - tax_validity_code
  - erp_export_shape_code
  - credit_charge_code
  - hitl_noise_score
  - cost_efficiency_code
  - no_unneeded_llm_code

# Metrics are inlined as `evaluate()` bodies because `agents-cli eval grade`
# runs in a subprocess that cannot import `ledgr_agent` directly. This mirrors
# the pattern already used by tests/eval/eval_config_credits.yaml.
# Each metric walks the agent trace to find the latest
# `process_document_batch` function_response payload (the BatchResult), then
# applies the same deterministic check as
# ledgr_agent/metrics/batch_result_metrics.py.

custom_metrics:
  - name: accounting_task_success_code
    custom_function: |
      def evaluate(instance):
          agent_data = instance.get("agent_data") or {}
          batch = None
          for turn in agent_data.get("turns", []):
              for event in turn.get("events", []):
                  content = event.get("content") or {}
                  for part in content.get("parts", []):
                      fr = part.get("function_response") or {}
                      if fr.get("name") == "process_document_batch":
                          payload = fr.get("response")
                          if isinstance(payload, dict):
                              batch = payload
          if batch is None:
              return {"score": 1.0, "explanation": "no batch"}
          status = batch.get("status")
          if status == "success":
              return {"score": 1.0, "explanation": "batch status=success"}
          return {"score": 0.0, "explanation": f"batch status={status!r}"}

  - name: doc_type_code
    custom_function: |
      def evaluate(instance):
          agent_data = instance.get("agent_data") or {}
          batch = None
          for turn in agent_data.get("turns", []):
              for event in turn.get("events", []):
                  content = event.get("content") or {}
                  for part in content.get("parts", []):
                      fr = part.get("function_response") or {}
                      if fr.get("name") == "process_document_batch":
                          payload = fr.get("response")
                          if isinstance(payload, dict):
                              batch = payload
          if batch is None:
              return {"score": 1.0, "explanation": "no batch"}
          valid = {"invoice", "receipt", "credit_note", "bank_statement", "mixed"}
          doc_type = batch.get("doc_type")
          if isinstance(doc_type, str) and doc_type in valid:
              return {"score": 1.0, "explanation": f"doc_type={doc_type}"}
          return {"score": 0.0, "explanation": f"unrecognised doc_type={doc_type!r}"}

  - name: tax_validity_code
    custom_function: |
      def evaluate(instance):
          agent_data = instance.get("agent_data") or {}
          batch = None
          for turn in agent_data.get("turns", []):
              for event in turn.get("events", []):
                  content = event.get("content") or {}
                  for part in content.get("parts", []):
                      fr = part.get("function_response") or {}
                      if fr.get("name") == "process_document_batch":
                          payload = fr.get("response")
                          if isinstance(payload, dict):
                              batch = payload
          if batch is None:
              return {"score": 1.0, "explanation": "no batch to grade"}
          version = (batch.get("validation_summary") or {}).get("tax_policy_version")
          hard_ids = {item.get("id") for item in batch.get("review_requests") or []}
          if version and "gst_claimed_by_non_registered_client" in hard_ids:
              return {"score": 1.0, "explanation": "policy violation correctly flagged"}
          if version:
              return {"score": 1.0, "explanation": f"policy {version} applied"}
          return {"score": 0.0, "explanation": "missing tax_policy_version"}

