metrics_to_run:
  - light_batch_code

custom_metrics:
  - name: light_batch_code
    custom_function: |
      def _batch_response(agent_data):
          for turn in agent_data.get("turns", []):
              for event in turn.get("events", []):
                  content = event.get("content") or {}
                  for part in content.get("parts", []):
                      fr = part.get("function_response")
                      if isinstance(fr, dict) and fr.get("name") == "process_document_batch":
                          return fr.get("response") or {}
          return {}

      def light_batch_code(instance):
          case_id = (instance.get("eval_case") or {}).get("eval_case_id", "")
          batch = _batch_response(instance.get("agent_data") or {})
          if not batch:
              return {"score": 0.0, "explanation": "no process_document_batch response in trace"}

          status = batch.get("status")
          llm_calls = int(batch.get("llm_call_count") or 0)
          models = batch.get("models_used") or []
          strong = bool(batch.get("strong_model_used"))
          processed = int(batch.get("documents_processed") or 0)

          if case_id == "light_batch_stub_invoice":
              expected_calls = 1
              min_processed = 1
          elif case_id == "light_batch_bill_and_bank":
              expected_calls = 2
              min_processed = 2
          else:
              return {"score": 0.0, "explanation": f"unknown eval_case_id {case_id!r}"}

          if llm_calls != expected_calls:
              return {
                  "score": 0.0,
                  "explanation": f"expected llm_call_count={expected_calls}, got {llm_calls}",
              }
          if strong:
              return {"score": 0.0, "explanation": "strong_model_used must be false on light batch"}
          if models and not all("flash" in str(m).lower() for m in models):
              return {
                  "score": 0.0,
                  "explanation": f"expected flash-tier models, got {models}",
              }
          if status not in {"success", "partial", "needs_review"}:
              return {"score": 0.0, "explanation": f"unexpected status={status!r}"}
          if processed < min_processed:
              return {
                  "score": 0.0,
                  "explanation": f"expected documents_processed>={min_processed}, got {processed}",
              }
          exports = batch.get("erp_exports") or []
          if not exports:
              return {"score": 0.0, "explanation": "expected erp_exports workbook summaries"}
          return {
              "score": 1.0,
              "explanation": (
                  f"light batch ok: status={status}, llm_call_count={llm_calls}, "
                  f"documents_processed={processed}"
              ),
          }
