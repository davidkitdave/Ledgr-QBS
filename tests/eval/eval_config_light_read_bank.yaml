metrics_to_run:
  - light_read_bank_tool_use_code

custom_metrics:
  - name: light_read_bank_tool_use_code
    custom_function: |
      import os
      from pathlib import Path

      def _tool_events(agent_data):
          calls = []
          responses = {}
          for turn in agent_data.get("turns", []):
              for event in turn.get("events", []):
                  content = event.get("content") or {}
                  for part in content.get("parts", []):
                      fc = part.get("function_call")
                      if isinstance(fc, dict) and fc.get("name"):
                          calls.append(fc.get("name"))
                      fr = part.get("function_response")
                      if isinstance(fr, dict) and fr.get("name"):
                          responses[fr.get("name")] = fr.get("response")
          return calls, responses

      def _txn_rows(sheets):
          total = 0
          for sheet in sheets:
              rows = sheet.get("rows") or []
              total += sum(
                  1
                  for r in rows
                  if r.get("Description") not in {"BALANCE B/F", "TOTALS"}
                  and (r.get("Date") or r.get("Withdrawal") or r.get("Deposit"))
              )
          return total

      def _score_maribank(calls, responses):
          doc_dir = os.environ.get("LEDGR_TEST_DOC_DIR", "")
          if not doc_dir:
              return {
                  "score": 0.0,
                  "explanation": "LEDGR_TEST_DOC_DIR not set — cannot run live bank PDF eval",
              }
          pdf = os.path.join(
              doc_dir,
              "Cast Unity",
              "Orange Perspective Consulting Pte. Ltd.",
              "BankStatement",
              "FY2025",
              "Oct2025_MariBank_Business_e-Statement.pdf",
          )
          if not os.path.isfile(pdf):
              return {"score": 0.0, "explanation": f"PDF missing at {pdf}"}

          need = {"read_bank_statement", "project_bank_workbook"}
          if not need.issubset(set(calls)):
              return {
                  "score": 0.0,
                  "explanation": f"expected tools {sorted(need)}, got {calls}",
              }
          if "read_document" in calls or "process_document_batch" in calls:
              return {
                  "score": 0.0,
                  "explanation": f"bank path should not call bill/factory tools: {calls}",
              }

          read = responses.get("read_bank_statement") or {}
          if read.get("status") == "error":
              return {
                  "score": 0.0,
                  "explanation": f"read_bank_statement error: {read.get('message')}",
              }

          accounts = read.get("accounts") or []
          if not accounts and not read.get("account_count"):
              return {"score": 0.0, "explanation": "no accounts extracted"}

          meta = read.get("extraction_meta") or {}
          mode = str(meta.get("extract_mode") or "")
          if mode not in {"digital", "vision"}:
              return {
                  "score": 0.0,
                  "explanation": f"unexpected extract_mode={mode!r}",
              }

          workbook = responses.get("project_bank_workbook") or {}
          if workbook.get("status") != "success":
              return {
                  "score": 0.0,
                  "explanation": f"project_bank_workbook failed: {workbook}",
              }

          sheets = workbook.get("sheets") or []
          if not sheets:
              return {"score": 0.0, "explanation": "no workbook sheets"}

          txn_rows = _txn_rows(sheets)
          reconcile_failures = 0
          for sheet in sheets:
              if not sheet.get("reconciled"):
                  note = str(sheet.get("reconcile_note") or "")
                  if note.startswith("1/") and "fail" in note:
                      reconcile_failures += 1
                  else:
                      return {
                          "score": 0.0,
                          "explanation": f"sheet {sheet.get('title')!r} not reconciled: {note}",
                      }

          if txn_rows < 30:
              return {"score": 0.0, "explanation": f"expected >=30 txn rows, got {txn_rows}"}

          if reconcile_failures > 1:
              return {
                  "score": 0.0,
                  "explanation": f"too many unreconciled sheets: {reconcile_failures}",
              }

          titles = [s.get("title") for s in sheets]
          return {
              "score": 1.0,
              "explanation": (
                  f"bank ok mode={mode}, sheets={titles}, txn_rows={txn_rows}, "
                  f"reconcile_failures={reconcile_failures}"
              ),
          }

      def _score_multi_ccy(calls, responses):
          pdf = Path("tests/fixtures/bank_multi_ccy_digital.pdf")
          if not pdf.is_file():
              return {"score": 0.0, "explanation": f"fixture missing at {pdf}"}

          need = {"read_bank_statement", "project_bank_workbook"}
          if not need.issubset(set(calls)):
              return {
                  "score": 0.0,
                  "explanation": f"expected tools {sorted(need)}, got {calls}",
              }

          read = responses.get("read_bank_statement") or {}
          if read.get("status") == "error":
              return {
                  "score": 0.0,
                  "explanation": f"read_bank_statement error: {read.get('message')}",
              }

          account_count = int(read.get("account_count") or len(read.get("accounts") or []))
          if account_count < 2:
              return {
                  "score": 0.0,
                  "explanation": f"expected >=2 accounts, got {account_count}",
              }

          workbook = responses.get("project_bank_workbook") or {}
          if workbook.get("status") != "success":
              return {
                  "score": 0.0,
                  "explanation": f"project_bank_workbook failed: {workbook}",
              }

          sheets = workbook.get("sheets") or []
          if len(sheets) < 2:
              return {
                  "score": 0.0,
                  "explanation": f"expected >=2 sheets, got {len(sheets)}",
              }

          titles = [str(s.get("title") or "") for s in sheets]
          has_sgd = any(t.endswith("SGD") for t in titles)
          has_usd = any(t.endswith("USD") for t in titles)
          if not (has_sgd and has_usd):
              return {
                  "score": 0.0,
                  "explanation": f"expected SGD and USD tabs, got {titles}",
              }

          txn_rows = _txn_rows(sheets)
          if txn_rows < 4:
              return {"score": 0.0, "explanation": f"expected >=4 txn rows, got {txn_rows}"}

          meta = read.get("extraction_meta") or {}
          if int(meta.get("gemini_call_count") or 0) != 1:
              return {
                  "score": 0.0,
                  "explanation": f"expected 1 gemini call, got {meta.get('gemini_call_count')}",
              }

          return {
              "score": 1.0,
              "explanation": (
                  f"multi-ccy ok accounts={account_count}, sheets={titles}, txn_rows={txn_rows}"
              ),
          }

      def evaluate(instance):
          agent_data = instance.get("agent_data") or {}
          calls, responses = _tool_events(agent_data)
          case_id = str(instance.get("eval_case_id") or "")

          if case_id == "light_read_bank_maribank":
              return _score_maribank(calls, responses)
          if case_id == "light_read_bank_multi_ccy":
              return _score_multi_ccy(calls, responses)
          return {"score": 1.0, "explanation": "no bank light-path requirement for this case"}
