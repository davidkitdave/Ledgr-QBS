# G-cluster extraction golden eval — WS-0.2 (document lane, ADR-0023).
#
# Graded by pytest ``tests/eval/test_g_extraction_golden.py`` using the
# custom metrics below. Document-lane PDF extraction does NOT go through
# ``agents-cli eval generate`` (chat-only); this config documents the metric
# contract and can feed ``agents-cli eval grade`` when doc-lane traces exist.
#
# Plan: docs/superpowers/plans/2026-06-21-intelligent-extraction-implementation.md

criteria:
  doc_count_score:
    threshold: 1.0
  extraction_totals_score:
    threshold: 1.0
  page_coverage_score:
    threshold: 1.0

custom_metrics:
  doc_count_score:
    code_config:
      name: tests.eval.extraction_metrics.adk_doc_count_score
  extraction_totals_score:
    code_config:
      name: tests.eval.extraction_metrics.adk_extraction_totals_score
  page_coverage_score:
    code_config:
      name: tests.eval.extraction_metrics.adk_page_coverage_score
