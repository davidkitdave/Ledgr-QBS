metrics_to_run:
  - light_read_erp_tool_use_code
  - light_read_cost_code

custom_metrics:
  - name: light_read_cost_code
    custom_function: |
      import json
      import os
      from pathlib import Path

      def _tool_events(agent_data):
          calls = []
          responses = {}
          for turn in agent_data.get("turns", []):
              for event in turn.get("events", []):
                  content = event.get("content") or {}
                  for part in content.get("parts", []):
                      fc = part.get("function_call")
                      if isinstance(fc, dict) and fc.get("name"):
                          calls.append(fc.get("name"))
                      fr = part.get("function_response")
                      if isinstance(fr, dict) and fr.get("name"):
                          responses[fr.get("name")] = fr.get("response")
          return calls, responses

      def _load_baseline(case_id):
          path = Path("tests/eval/baselines/light_read_auditair_iso.json")
          if not path.is_file():
              return None
          try:
              data = json.loads(path.read_text(encoding="utf-8"))
          except (OSError, json.JSONDecodeError):
              return None
          if str(data.get("eval_case_id") or "") != case_id:
              return None
          return data

      def evaluate(instance):
          case_id = str(instance.get("eval_case_id") or "")
          if case_id != "light_read_auditair_iso":
              return {"score": 1.0, "explanation": "no light-read cost requirement for this case"}

          agent_data = instance.get("agent_data") or {}
          calls, responses = _tool_events(agent_data)

          if "process_document_batch" in calls:
              return {
                  "score": 0.0,
                  "explanation": "factory path used — light read should not call process_document_batch",
              }

          read = responses.get("read_document") or {}
          if read.get("status") == "error":
              return {
                  "score": 0.0,
                  "explanation": f"read_document error: {read.get('message')}",
              }

          meta = read.get("extraction_meta") or {}
          call_count = int(meta.get("gemini_call_count") or 0)
          if call_count != 1:
              return {
                  "score": 0.0,
                  "explanation": f"expected gemini_call_count=1, got {call_count}",
              }

          model = str(meta.get("model") or "").lower()
          if "flash" not in model or "pro" in model:
              return {
                  "score": 0.0,
                  "explanation": f"expected lite-tier flash model, got {meta.get('model')!r}",
              }

          usage = meta.get("usage") or {}
          total_tokens = usage.get("total_token_count")
          if total_tokens is None:
              return {
                  "score": 0.0,
                  "explanation": "read_document missing extraction_meta.usage.total_token_count",
              }

          total_tokens = int(total_tokens)
          baseline = _load_baseline(case_id)
          ceiling = baseline.get("total_token_count") if baseline else None
          if ceiling is None:
              return {
                  "score": 1.0,
                  "explanation": (
                      f"baseline not set — record total_token_count={total_tokens} in "
                      "tests/eval/baselines/light_read_auditair_iso.json"
                  ),
              }

          ceiling = int(ceiling)
          max_allowed = int(ceiling * 1.10)
          if total_tokens > max_allowed:
              return {
                  "score": 0.0,
                  "explanation": (
                      f"total_token_count={total_tokens} exceeds baseline ceiling "
                      f"{max_allowed} (baseline={ceiling} +10%)"
                  ),
              }

          if "project_to_erp" not in calls:
              return {
                  "score": 0.0,
                  "explanation": f"project_to_erp not called; tools={calls}",
              }

          return {
              "score": 1.0,
              "explanation": (
                  f"cost ok: gemini_call_count=1, model={meta.get('model')}, "
                  f"total_token_count={total_tokens} <= {max_allowed}"
              ),
          }

  - name: light_read_erp_tool_use_code
    custom_function: |
      import json
      import os

      def _tool_events(agent_data):
          calls = []
          responses = {}
          for turn in agent_data.get("turns", []):
              for event in turn.get("events", []):
                  content = event.get("content") or {}
                  for part in content.get("parts", []):
                      fc = part.get("function_call")
                      if isinstance(fc, dict) and fc.get("name"):
                          calls.append(fc.get("name"))
                      fr = part.get("function_response")
                      if isinstance(fr, dict) and fr.get("name"):
                          responses[fr.get("name")] = fr.get("response")
          return calls, responses

      def _norm_inv(value):
          return str(value or "").strip().upper().replace(" ", "")

      def evaluate(instance):
          agent_data = instance.get("agent_data") or {}
          calls, responses = _tool_events(agent_data)
          case_id = str(instance.get("eval_case_id") or "")

          if case_id == "light_project_to_erp_tool":
              ok = "project_to_erp" in calls
              return {
                  "score": 1.0 if ok else 0.0,
                  "explanation": "project_to_erp called" if ok else f"tool calls={calls}",
              }

          if case_id == "light_read_auditair_iso":
              doc_dir = os.environ.get("LEDGR_TEST_DOC_DIR", "")
              if not doc_dir:
                  return {
                      "score": 0.0,
                      "explanation": "LEDGR_TEST_DOC_DIR not set — cannot run live PDF eval",
                  }
              pdf = os.path.join(
                  doc_dir,
                  "Cast Unity",
                  "Auditair International Pte. Ltd.",
                  "Purchase",
                  "FY2026",
                  "Tax Invoice #11861 Audit for ISO.pdf",
              )
              if not os.path.isfile(pdf):
                  return {
                      "score": 0.0,
                      "explanation": f"PDF missing at {pdf}",
                  }

              need = {"read_document", "project_to_erp"}
              if not need.issubset(set(calls)):
                  return {
                      "score": 0.0,
                      "explanation": f"expected tools {sorted(need)}, got {calls}",
                  }

              read = responses.get("read_document") or {}
              if read.get("status") == "error":
                  return {
                      "score": 0.0,
                      "explanation": f"read_document error: {read.get('message')}",
                  }

              inv = _norm_inv(read.get("invoice_number"))
              if inv not in {"INV011861", "INV11861"}:
                  return {
                      "score": 0.0,
                      "explanation": f"invoice_number={read.get('invoice_number')!r}, expected INV 011861",
                  }

              try:
                  grand = float(read.get("grand_total"))
              except (TypeError, ValueError):
                  grand = None
              if grand != 3052.0:
                  return {
                      "score": 0.0,
                      "explanation": f"grand_total={read.get('grand_total')!r}, expected 3052.0",
                  }

              vendor = str(read.get("vendor_name") or "")
              customer = str(read.get("customer_name") or "")
              if "AUDITAIR" not in customer.upper():
                  return {
                      "score": 0.0,
                      "explanation": f"customer_name={customer!r}, expected AUDITAIR",
                  }
              if not vendor:
                  return {
                      "score": 0.0,
                      "explanation": "vendor_name empty",
                  }

              erp = responses.get("project_to_erp") or {}
              qbs = ((erp.get("results") or {}).get("qbs") or {})
              rows = qbs.get("rows") or []
              if not rows:
                  return {"score": 0.0, "explanation": "no QBS rows from project_to_erp"}

              doc_type = str(read.get("doc_type") or "").lower()
              if doc_type != "purchase":
                  return {
                      "score": 0.0,
                      "explanation": f"doc_type={doc_type!r}, expected purchase for AP bill",
                  }

              sheet = str(qbs.get("sheet") or "")
              if sheet != "Purchase":
                  return {
                      "score": 0.0,
                      "explanation": f"QBS sheet={sheet!r}, expected Purchase",
                  }

              row0 = rows[0]
              try:
                  sub_total = float(row0.get("Sub Total"))
              except (TypeError, ValueError):
                  sub_total = None
              if sub_total != 2800.0:
                  return {
                      "score": 0.0,
                      "explanation": f"QBS Sub Total={row0.get('Sub Total')!r}, expected 2800.0",
                  }

              try:
                  tax_amt = float(row0.get("Tax Amount"))
              except (TypeError, ValueError):
                  tax_amt = None
              if tax_amt != 252.0:
                  return {
                      "score": 0.0,
                      "explanation": f"QBS Tax Amount={row0.get('Tax Amount')!r}, expected 252.0",
                  }

              qbs_total = row0.get("Total") or row0.get("Total Amount")
              try:
                  qbs_total_f = float(qbs_total)
              except (TypeError, ValueError):
                  qbs_total_f = None
              if qbs_total_f != 3052.0:
                  return {
                      "score": 0.0,
                      "explanation": f"QBS total={qbs_total!r}, expected 3052.0",
                  }

              return {
                  "score": 1.0,
                  "explanation": (
                      f"read ok vendor={vendor}, inv={read.get('invoice_number')}, "
                      f"doc_type=purchase, QBS Purchase Sub Total=2800 Tax=252 Total=3052"
                  ),
              }

          return {"score": 1.0, "explanation": "no light-path tool requirement for this case"}
