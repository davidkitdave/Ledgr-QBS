metrics_to_run:
  - chat_tool_trajectory_match
  - custom_response_quality

criteria:
  chat_tool_trajectory_match: 1.0
  custom_response_quality: 3.0

custom_metrics:
  - name: chat_tool_trajectory_match
    custom_function: |
      def evaluate(instance):
          """Subsequence match: expected tool names appear in order in actual trace."""
          expected = instance.get("expected_tool_trajectory") or []
          actual = instance.get("actual_tool_trajectory") or []
          if not expected:
              return {"score": 1.0, "explanation": "no expected tools"}
          ei = 0
          for name in actual:
              if ei < len(expected) and name == expected[ei]:
                  ei += 1
          score = 1.0 if ei == len(expected) else 0.0
          return {
              "score": score,
              "explanation": f"expected={expected} actual={actual} matched={ei}/{len(expected)}",
          }

  - name: custom_response_quality
    prompt_template: |
      You are grading a Ledgr accounting chat assistant. The user asked about
      their ledger or document processing. Grade the final response 1-5 for
      accuracy, use of ledger data (not asking the user for info already in
      state), and clarity.

      User prompt: {prompt}
      Final response: {response}
      Tool trace (actual): {agent_data}

      Return JSON: {"score": <1-5>, "explanation": "<reason>"}
