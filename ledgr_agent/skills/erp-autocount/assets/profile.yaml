software_name: AutoCount
system: autocount
exporter: profile

# Sheet names per doc type (AutoCount imports AP and AR as separate operations)
purchase_sheet: "Purchase"
sales_sheet: "Sales"

# AP Invoice columns — exact field row from Import-AP-Invoice.xls row 2, cols 1..21
purchase_cols:
  - DocNo
  - DocDate
  - CreditorCode
  - SupplierInvoiceNo
  - JournalType
  - DisplayTerm
  - PurchaseAgent
  - Description
  - CurrencyRate
  - RefNo2
  - Note
  - InclusiveTax
  - AccNo
  - ToAccountRate
  - DetailDescription
  - ProjNo
  - DeptNo
  - TaxType
  - TaxableAmt
  - TaxAdjustment
  - Amount

# AR Invoice columns — exact field row from Import-AR-Invoice.xls row 2, cols 1..21
sales_cols:
  - DocNo
  - DocDate
  - DebtorCode
  - JournalType
  - DisplayTerm
  - SalesAgent
  - Description
  - CurrencyCode
  - CurrencyRate
  - RefNo2
  - Note
  - InclusiveTax
  - AccNo
  - ToAccountRate
  - DetailDescription
  - ProjNo
  - DeptNo
  - TaxType
  - TaxableAmt
  - TaxAdjustment
  - Amount

# Curated Slack-preview column subset (WS-5.2 fix). The full purchase_cols/
# sales_cols lists (21 cols each) are correct for the .xlsx export, but Slack's
# data_table block allows at most 20 columns per row — and the full list is also
# too wide to read in chat. These curated subsets mirror the ~8-9 col single-doc
# card view and MUST include the amount/total column (Amount) plus the key
# identity columns. preview_columns_from_profile() reads these when present and
# falls back to purchase_cols/sales_cols otherwise.
purchase_preview_cols:
  - DocNo
  - DocDate
  - CreditorCode
  - SupplierInvoiceNo
  - Description
  - AccNo
  - TaxType
  - TaxableAmt
  - Amount

sales_preview_cols:
  - DocNo
  - DocDate
  - DebtorCode
  - Description
  - AccNo
  - TaxType
  - TaxableAmt
  - Amount

# Constant values applied after field mapping (per doc type)
purchase_constants:
  DocNo: "<<New>>"
  JournalType: "PURCHASE"
  InclusiveTax: "F"

sales_constants:
  DocNo: "<<New>>"
  JournalType: "SALES"
  InclusiveTax: "F"

required_purchase:
  - DocNo
  - DocDate
  - CreditorCode
  - JournalType
  - InclusiveTax
  - AccNo
  - Amount

required_sales:
  - DocNo
  - DocDate
  - DebtorCode
  - JournalType
  - InclusiveTax
  - AccNo
  - Amount

purchase_fields:
  DocDate: invoice_date
  CreditorCode: creditor_code
  SupplierInvoiceNo: supplier_invoice_no
  Description: description
  CurrencyRate: currency_rate
  AccNo: account_code
  DetailDescription: description
  TaxType: tax_code
  TaxableAmt: taxable_amount
  Amount: sub_total

sales_fields:
  DocDate: invoice_date
  DebtorCode: debtor_code
  Description: description
  CurrencyCode: currency
  CurrencyRate: currency_rate
  AccNo: account_code
  DetailDescription: description
  TaxType: tax_code
  TaxableAmt: taxable_amount
  Amount: sub_total
