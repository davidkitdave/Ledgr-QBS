# Canonical tax-keyword alias ladder (jurisdiction-independent).
#
# Maps a lowercased, stripped `tax_keyword` (as printed on an invoice and
# captured by extraction) to a canonical tax treatment short code. This is the
# data form of the ordered keyword ladder that previously lived hardcoded in
# tax_classifier.py (_classify_purchase / _classify_sales). The codes ZR / ES /
# OS / NT / SR are generic and identical across SG GST and MY SST, so the table
# is SHARED rather than duplicated per jurisdiction.
#
# ORDER MATTERS — first matching entry wins. Do not reorder without checking
# tax_classifier behavior and tests/test_tax_classifier.py.
#
# match types:
#   exact     -> kw == pattern
#   prefix    -> kw.startswith(pattern)
#   substring -> pattern in kw
#
# The SR row's percent-rate aliases (e.g. "8%") are NOT listed here: they are
# derived dynamically from each jurisdiction YAML's rate bands
# (TaxClassifier._sr_tax_keyword_match via rate_keyword_strings) so the alias
# set tracks the active rate regime. This table only holds the static patterns.
keyword_aliases:
  - { treatment: ZR, match: exact,     pattern: "z" }
  - { treatment: ZR, match: prefix,    pattern: "zr" }
  - { treatment: ZR, match: substring, pattern: "zero" }
  - { treatment: ZR, match: substring, pattern: "0%" }
  - { treatment: ES, match: exact,     pattern: "e" }
  - { treatment: ES, match: prefix,    pattern: "es" }
  - { treatment: ES, match: substring, pattern: "exempt" }
  - { treatment: OS, match: prefix,    pattern: "os" }
  - { treatment: OS, match: substring, pattern: "out of scope" }
  - { treatment: NT, match: exact,     pattern: "n" }
  - { treatment: NT, match: prefix,    pattern: "nt" }
  - { treatment: NT, match: substring, pattern: "no tax" }
  - { treatment: NT, match: substring, pattern: "no-tax" }
  - { treatment: SR, match: exact,     pattern: "g" }
  - { treatment: SR, match: exact,     pattern: "gst" }
  - { treatment: SR, match: prefix,    pattern: "sr" }
  - { treatment: SR, match: prefix,    pattern: "tx" }
  - { treatment: SR, match: substring, pattern: "standard" }
