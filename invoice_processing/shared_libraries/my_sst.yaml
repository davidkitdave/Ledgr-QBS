# Malaysia SST (Sales Tax & Service Tax) reference data.
#
# Used as:
#   1. LLM tax-reasoning context — the per-region rate bands + code_map are
#      surfaced to the tax agent as part of its instructions so the LLM can
#      validate the math (e.g. 4.81 ≈ 8% of 60.19) and pick the right
#      treatment label (SR/SSR/ST/ZR/ES/NT).
#   2. Python rate-guard validation — tax_node reads `rate_by_date` to compare
#      the LLM's per-line tax_confidence + arithmetic to a numerical tolerance.
#
# Per JPJ / KPDN / RMCD guidance (consolidated):
#   * Service Tax (Act 738) — flat 8% on prescribed taxable services.
#     Effective rate 8% from 01-09-2018 (replaced GST); 6% was the prior
#     pre-2018 transitional band (kept for very old invoices).
#   * Sales Tax (Act 2018) — variable 5%/10%/non-standard on manufactured
#     goods.  Sales Tax is rarely seen on a service-style receipt.
#   * Tourism Tax — flat RM10/room/night on hotel stays.
#
# This file deliberately stays SLIM (rates + code_map) — the LLM does the
# per-line treatment reasoning from the document; Python only does the
# arithmetic check. No 300-line rule spaghetti.

tax_system: SST

# Service Tax band by time of supply. Currently 8% flat since 2018-09-01.
rate_by_date:
  - { from: "2018-09-01", to: null, rate: 0.08 }

# Canonical treatments for Malaysia. Kept distinct from SG's vocabulary to
# preserve audit clarity; the LLM agent maps doc-language ("Service Tax 8%",
# "SST", "(SR)") to these codes. Cross-border (import/reverse-charge) flows
# back to "OS" or "EXEMPT" depending on direction.
treatments:
  SR: { name: "Standard-Rated (Service Tax)", claimable: true,  zero_rate: false }
  SSR: { name: "Sales Tax (goods)",            claimable: true,  zero_rate: false }
  ZR: { name: "Zero-Rated",                    claimable: true,  zero_rate: true  }
  ES: { name: "Exempt",                        claimable: false, zero_rate: true  }
  OS: { name: "Out-of-Scope",                  claimable: null,  zero_rate: true  }
  IM: { name: "Imported / Reverse Charge",     claimable: null,  zero_rate: true  }
  NT: { name: "No-Tax",                        claimable: false, zero_rate: true  }

# Canonical treatment -> target-system tax-code string, by direction.
# QBS / AutoCount / SQL Acc short codes for Malaysia per client setup.
code_map:
  qbs:
    purchase: { SR: "SR", SSR: "SR", ZR: "ZR", ES: "ES", OS: "OS", IM: "IM", NT: "NT" }
    sales:    { SR: "SR", SSR: "SR", ZR: "ZR", ES: "ES", OS: "OS", NT: "NT" }
  xero:
    purchase: { SR: "SR", SSR: "SR", ZR: "ZR", ES: "No Tax", OS: "No Tax", IM: "No Tax", NT: "No Tax" }
    sales:    { SR: "SR", SSR: "SR", ZR: "ZR", ES: "No Tax", OS: "No Tax", NT: "No Tax" }

# Signal lexicons (lowercased substring match) used by the LLM tax prompt —
# the LLM uses these substrings to pick the right treatment when the
# document has explicit tax wording. PYTHON MUST NOT use these directly;
# they're a hint set for the LLM.
signals:
  zero_rated:
    - zero-rated
    - zero rated
    - 0%
    - export
    - international service
    - "(zr)"
  exempt:
    - exempt
    - exempt supply
    - "(es)"
  no_tax:
    - no tax
    - out of scope
    - "(nt)"
    - "(os)"
  service_tax:
    - service tax
    - sst 8%
    - sst
    - 8% service tax
    - "(sr)"
    - service tax 8%
  sales_tax:
    - sales tax
    - 10% sales tax
    - 5% sales tax

# Confidence + tolerance for Python rate guards.
review:
  confidence_threshold: 0.8
  rate_tolerance: 0.01