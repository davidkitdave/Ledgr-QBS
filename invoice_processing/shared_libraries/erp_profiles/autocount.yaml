software_name: AutoCount
system: autocount

# Sheet names per doc type (AutoCount imports AP and AR as separate operations)
purchase_sheet: "AP Invoice"
sales_sheet: "AR Invoice"

# AP Invoice columns — exact field row from Import-AP-Invoice.xls row 2, cols 1..21
purchase_cols:
  - DocNo
  - DocDate
  - CreditorCode
  - SupplierInvoiceNo
  - JournalType
  - DisplayTerm
  - PurchaseAgent
  - Description
  - CurrencyRate
  - RefNo2
  - Note
  - InclusiveTax
  - AccNo
  - ToAccountRate
  - DetailDescription
  - ProjNo
  - DeptNo
  - TaxType
  - TaxableAmt
  - TaxAdjustment
  - Amount

# AR Invoice columns — exact field row from Import-AR-Invoice.xls row 2, cols 1..21
sales_cols:
  - DocNo
  - DocDate
  - DebtorCode
  - JournalType
  - DisplayTerm
  - SalesAgent
  - Description
  - CurrencyCode
  - CurrencyRate
  - RefNo2
  - Note
  - InclusiveTax
  - AccNo
  - ToAccountRate
  - DetailDescription
  - ProjNo
  - DeptNo
  - TaxType
  - TaxableAmt
  - TaxAdjustment
  - Amount

# Constant values applied after field mapping (per doc type)
purchase_constants:
  DocNo: "<<New>>"
  JournalType: "PURCHASE"
  InclusiveTax: "F"

sales_constants:
  DocNo: "<<New>>"
  JournalType: "SALES"
  InclusiveTax: "F"

required_purchase:
  - DocNo
  - DocDate
  - CreditorCode
  - JournalType
  - InclusiveTax
  - AccNo
  - Amount

required_sales:
  - DocNo
  - DocDate
  - DebtorCode
  - JournalType
  - InclusiveTax
  - AccNo
  - Amount

purchase_fields:
  DocDate: invoice_date
  CreditorCode: creditor_code
  SupplierInvoiceNo: supplier_invoice_no
  Description: description
  CurrencyRate: currency_rate
  AccNo: account_code
  DetailDescription: description
  TaxType: tax_code
  TaxableAmt: unit_price
  Amount: sub_total

sales_fields:
  DocDate: invoice_date
  DebtorCode: debtor_code
  Description: description
  CurrencyCode: currency
  CurrencyRate: currency_rate
  AccNo: account_code
  DetailDescription: description
  TaxType: tax_code
  TaxableAmt: unit_price
  Amount: sub_total
